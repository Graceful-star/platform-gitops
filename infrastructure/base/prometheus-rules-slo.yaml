apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: slo-rules
  namespace: monitoring
  labels:
    prometheus: kube-prometheus-stack
spec:
  groups:
    - name: slo_availability
      interval: 30s
      rules:
        - record: frontend:requests:success_rate
          expr: |
            sum(rate(frontend_requests_total{status=~"2.."}[5m]))
            /
            sum(rate(frontend_requests_total[5m]))

        - record: frontend:requests:error_rate
          expr: |
            sum(rate(frontend_requests_total{status=~"5.."}[5m]))
            /
            sum(rate(frontend_requests_total[5m]))

        - record: backend:requests:success_rate
          expr: |
            sum(rate(backend_requests_total{status=~"2.."}[5m]))
            /
            sum(rate(backend_requests_total[5m]))

        - record: slo:availability:frontend
          expr: frontend:requests:success_rate

    - name: slo_latency
      interval: 30s
      rules:
        - record: frontend:latency:p50
          expr: histogram_quantile(0.50, rate(frontend_request_duration_seconds_bucket[5m]))

        - record: frontend:latency:p95
          expr: histogram_quantile(0.95, rate(frontend_request_duration_seconds_bucket[5m]))

        - record: frontend:latency:p99
          expr: histogram_quantile(0.99, rate(frontend_request_duration_seconds_bucket[5m]))

        - record: backend:latency:p95
          expr: histogram_quantile(0.95, rate(backend_request_duration_seconds_bucket[5m]))

    - name: slo_error_budget
      interval: 1m
      rules:
        - record: slo:error_budget:burn_rate:1h
          expr: |
            (1 - frontend:requests:success_rate)
            /
            (1 - 0.999)

        - record: slo:error_budget:burn_rate:6h
          expr: |
            (1 - (sum(rate(frontend_requests_total{status=~"2.."}[6h])) / sum(rate(frontend_requests_total[6h]))))
            /
            (1 - 0.999)

        - record: slo:error_budget:remaining:30d
          expr: |
            1 - (
              (sum(increase(frontend_requests_total[30d])) - sum(increase(frontend_requests_total{status=~"2.."}[30d])))
              /
              (sum(increase(frontend_requests_total[30d])) * 0.001)
            )