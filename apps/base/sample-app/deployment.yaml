apiVersion: v1
kind: Namespace
metadata:
  name: sample-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: sample-app
  labels:
    app: frontend
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend
      version: v1
  template:
    metadata:
      labels:
        app: frontend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: sample-app
      containers:
        - name: frontend
          image: 586794457112.dkr.ecr.us-east-1.amazonaws.com/sre-capstone-dev-app:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          
          env:
            - name: BACKEND_URL
              value: "http://backend:8081"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector-grpc.monitoring:4317"
            - name: OTEL_SERVICE_NAME
              value: "frontend"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=sample-app,service.version=v1"
            - name: PORT
              value: "8080"
          
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: sample-app
  labels:
    app: backend
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
      version: v1
  template:
    metadata:
      labels:
        app: backend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: sample-app
      containers:
        - name: backend
          image: 586794457112.dkr.ecr.us-east-1.amazonaws.com/sre-capstone-dev-app:latest
          imagePullPolicy: Always
          command: ["gunicorn"]
          args:
            - "--bind"
            - "0.0.0.0:8081"
            - "--workers"
            - "4"
            - "--timeout"
            - "30"
            - "--access-logfile"
            - "-"
            - "backend_app:app"
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          
          env:
            - name: PORT
              value: "8081"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector-grpc.monitoring:4317"
            - name: OTEL_SERVICE_NAME
              value: "backend"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=sample-app,service.version=v1"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: database_password
          
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sample-app
  namespace: sample-app